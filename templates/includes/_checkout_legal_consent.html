{% load i18n shop_urls %}
<div class="shop-checkout-legal{% if field.errors %} shop-field--invalid{% endif %}">
    <label class="shop-checkout-legal__option" for="{{ field.id_for_label }}">
        {{ field }}
        <span class="shop-checkout-legal__text">
            {% trans "I have read and accept the" %}
            <a href="{% shop_url 'core:terms' %}" target="_blank" rel="noopener noreferrer">{% trans "Terms of Service" %}</a>
            {% trans "and" %}
            <a href="{% shop_url 'core:privacy' %}" target="_blank" rel="noopener noreferrer">{% trans "Privacy Policy" %}</a>.
        </span>
    </label>
    {% for error in field.errors %}
    <p class="shop-field__error" role="alert">{{ error }}</p>
    {% endfor %}
</div>
