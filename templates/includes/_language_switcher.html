{% load i18n %}
<form action="{% url 'set_language' %}" method="post" class="d-flex align-items-center">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    <label for="language-select" class="visually-hidden">{% trans "Language" %}</label>
    <select id="language-select" name="language" class="form-select form-select-sm" onchange="this.form.submit()">
        {% get_current_language as CURRENT_LANG %}
        {% get_available_languages as LANGUAGES %}
        {% for lang_code, lang_name in LANGUAGES %}
            <option value="{{ lang_code }}"{% if lang_code == CURRENT_LANG %} selected{% endif %}>
                {{ lang_name }}
            </option>
        {% endfor %}
    </select>
</form>
