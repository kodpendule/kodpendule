{% load i18n %}
{% if nav_categories %}
<nav class="category-nav mb-4" aria-label="{% trans 'Categories' %}">
    <div class="shop-category-chips" role="list">
        <a class="shop-chip{% if not active_category %} is-active{% endif %}" href="{% url 'products:list' %}" role="listitem">
            {% trans "All products" %}
        </a>
        {% for category in nav_categories %}
        <a class="shop-chip{% if active_category and active_category.pk == category.pk %} is-active{% endif %}"
           href="{{ category.get_absolute_url }}" role="listitem">
            {{ category.name }}
        </a>
        {% endfor %}
    </div>
</nav>
{% endif %}
