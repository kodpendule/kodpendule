{% load shop_urls i18n %}
{% if products %}
<section class="shop-section shop-products-section shop-home-promo" aria-labelledby="home-section-promo-sale">
    <div class="container shop-container">
        <header class="shop-section__header shop-reveal" data-reveal>
            <div>
                <p class="shop-section__eyebrow shop-section__eyebrow--sale">{% trans "Special offers" %}</p>
                <h2 class="shop-section__title" id="home-section-promo-sale">{% trans "Promo sale" %}</h2>
                <p class="shop-section__subtitle mb-0">{% trans "Limited-time discounts — swipe or use arrows to browse." %}</p>
            </div>
            <a class="shop-btn shop-btn--secondary shop-btn--sm" href="{% shop_url 'products:promo' %}">
                {% trans "View all" %}
            </a>
        </header>

        {% include "includes/_home_product_carousel.html" with products=products %}
    </div>
</section>
{% endif %}
