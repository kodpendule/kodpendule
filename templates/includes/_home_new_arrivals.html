{% load shop_urls i18n %}
{% if new_arrivals %}
<section class="shop-section shop-products-section shop-home-new" aria-labelledby="home-section-new-arrivals">
    <div class="container shop-container">
        <header class="shop-section__header shop-reveal" data-reveal>
            <div>
                <p class="shop-section__eyebrow">{% trans "Just in" %}</p>
                <h2 class="shop-section__title" id="home-section-new-arrivals">{% trans "New arrivals" %}</h2>
                <p class="shop-section__subtitle mb-0">{% trans "Fresh picks from our catalog — updated regularly." %}</p>
            </div>
            <a class="shop-btn shop-btn--secondary shop-btn--sm" href="{% shop_url 'products:list' %}">
                {% trans "View all" %}
            </a>
        </header>
        <div class="shop-reveal-stagger" data-reveal-stagger>
            {% include "includes/_product_grid.html" with products=new_arrivals %}
        </div>
    </div>
</section>
{% endif %}
