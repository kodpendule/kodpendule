{% load i18n %}
{% if promos %}
<section class="promo-section py-4">
    <div class="container">
        <div class="row g-4">
            {% for promo in promos %}
            <div class="col-md-{% if promos|length == 1 %}12{% else %}6{% endif %}">
                <div class="card border-0 shadow-sm h-100 overflow-hidden">
                    {% if promo.link_url %}
                    <a href="{{ promo.link_url }}" class="text-decoration-none text-dark">
                    {% endif %}
                    {% if promo.image %}
                        <img src="{{ promo.image.url }}" class="card-img-top promo-section__img" alt="{{ promo.title|default:'' }}" loading="lazy">
                    {% endif %}
                    <div class="card-body">
                        {% if promo.title %}<h2 class="h5 card-title">{{ promo.title }}</h2>{% endif %}
                        {% if promo.body %}<p class="card-text text-muted mb-0">{{ promo.body }}</p>{% endif %}
                    </div>
                    {% if promo.link_url %}
                    </a>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endif %}
