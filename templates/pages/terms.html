{% extends "base.html" %}

{% endblock %}

{% block content %}
<div class="shop-page shop-page--legal">

    </header>
    <article class="shop-legal shop-card shop-contact-card">
        {% include "includes/legal/_terms_content.html" %}
    </article>
</div>
</div>
{% endblock %}
